<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment Form Example</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
  />

  <link rel="stylesheet" href="index.css" />
</head>
<body class="bg-light">
  <div class="container py-5">
    <div class="card">
      <div class="card-header">
        <h2 class="mb-0 fw-bold">Payment form example</h2>
      </div>

      <div class="card-body">
        <div class="alert alert-danger" role="alert">
          Some Fields Are Missing
        </div>

        <form>
          <div class="row mb-3">
            <div class="col-md-5">
              <label for="cardNumber" class="form-label">Card #</label>
              <input
                type="text"
                class="form-control"
                id="cardNumber"
                placeholder="XXXXXXXXXXXXXXXX"
                required
              />
            </div>

            <div class="col-md-3">
              <label for="cvc" class="form-label">CVC #</label>
              <input
                type="text"
                class="form-control"
                id="cvc"
                placeholder="0000"
                required
              />
            </div>

            <div class="col-md-4">
              <label for="amount" class="form-label">Amount</label>
              <div class="input-group">
                <span class="input-group-text">$</span>
                <input
                  type="number"
                  class="form-control"
                  id="amount"
                  placeholder="Amount"
                  required
                />
              </div>
            </div>
          </div>

          <div class="row mb-3">
            <div class="col-md-6">
              <label for="firstName" class="form-label">First Name</label>
              <input type="text" class="form-control" id="firstName" required />
            </div>

            <div class="col-md-6">
              <label for="lastName" class="form-label">Last Name</label>
              <input type="text" class="form-control" id="lastName" required />
            </div>
          </div>

          <div class="row mb-3">
            <div class="col-md-6">
              <label for="city" class="form-label">City</label>
              <input type="text" class="form-control" id="city" required />
            </div>

            <div class="col-md-3">
              <label for="state" class="form-label">State</label>
              <select class="form-select" id="state" required>
                <option selected>Pick a state</option>
                <option>California</option>
                <option>Texas</option>
                <option>Florida</option>
                <option>New York</option>
              </select>
            </div>

            <div class="col-md-3">
              <label for="postalCode" class="form-label">Postal Code</label>
              <input type="text" class="form-control" id="postalCode" required />
            </div>
          </div>

          <div class="row mb-3">
            <div class="col-md-6">
              <label class="form-label">We accept:</label>
              <div class="bg-secondary text-white p-3 rounded">
                <div class="form-check form-check-inline">
                  <input class="form-check-input" type="radio" name="cards" id="card1" />
                  <label class="form-check-label" for="card1">
                    <i class="fa-brands fa-cc-mastercard"></i>
                  </label>
                </div>

                <div class="form-check form-check-inline">
                  <input class="form-check-input" type="radio" name="cards" id="card2" />
                  <label class="form-check-label" for="card2">
                    <i class="fa-brands fa-cc-visa"></i>
                  </label>
                </div>

                <div class="form-check form-check-inline">
                  <input class="form-check-input" type="radio" name="cards" id="card3" />
                  <label class="form-check-label" for="card3">
                    <i class="fa-brands fa-cc-diners-club"></i>
                  </label>
                </div>

                <div class="form-check form-check-inline">
                  <input class="form-check-input" type="radio" name="cards" id="card4" />
                  <label class="form-check-label" for="card4">
                    <i class="fa-brands fa-cc-amex"></i>
                  </label>
                </div>
              </div>
            </div>

            <div class="col-md-6">
              <label for="message" class="form-label">Message</label>
              <textarea class="form-control" id="message" rows="4"></textarea>
              <div class="form-text">Add any notes here.</div>
            </div>
          </div>
        </form>
      </div>

      <div class="card-footer text-end">
        <button type="button" class="btn btn-secondary">Cancel</button>
        <button type="submit" class="btn btn-primary">Send</button>
      </div>
    </div>
  </div>
</body>
</html>
